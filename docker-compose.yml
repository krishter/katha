services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: katha
      POSTGRES_PASSWORD: katha
      POSTGRES_DB: katha
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://katha:katha@db:5432/katha
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:
